# Development overrides — mount sources for hot reload
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DEBUG: "true"
    volumes:
      - ./backend:/app

  frontend:
    build:
      target: deps           # stop before build step, use next dev
    command: pnpm dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
